<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5b9bd5">
<title>AIアプリ道場</title>

<!-- PWA基本設定 -->
<link rel="manifest" href="./manifest.json">

<!-- iOS用：ホーム画面に追加された時の設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI道場">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

<!-- Android用 -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="AIアプリ道場">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  /* メインカラー：やさしい青 */
  --gold:    #5b9bd5;        /* 旧：金 → やさしい青 */
  --gold-lt: #8ec5f0;        /* 旧：淡金 → 明るい空色 */
  /* アクセント：コーラル（CTAなど強調用） */
  --shu:     #ff7e67;        /* 旧：朱色 → コーラル */
  --shu-lt:  #ffa38d;        /* 旧：淡朱 → ピーチ */
  /* 背景：白〜薄いベージュ */
  --ink:     #fdfbf7;        /* 旧：墨 → クリームホワイト */
  --ink2:    #ffffff;        /* カード背景：純白 */
  --ink3:    #f5f1ea;        /* サブ背景：薄ベージュ */
  --ink4:    #e8e2d5;        /* 境界線：ベージュ */
  --ink5:    #b8aea0;        /* 薄めの線 */
  /* テキスト：濃い茶 */
  --washi:   #3d3529;        /* 旧：白 → 濃茶（メインテキスト） */
  --washi2:  #6b5d4c;        /* サブテキスト */
  --washi3:  #9a8d7c;        /* ヒント・薄字 */
  /* 追加：グリーン（成功・ポジティブ） */
  --mint:    #7ec9a8;
  --mint-lt: #a9dcc2;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
@keyframes slideUp { from { opacity:0; transform:translateY(22px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse { 0%,100% { transform:scale(1) } 50% { transform:scale(1.06) } }
@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }
@keyframes shimmer { 0% { background-position:200% center } 100% { background-position:-200% center } }
@keyframes slideIn { from { opacity:0; transform:translateX(-10px) } to { opacity:1; transform:translateX(0) } }
@keyframes goldPulse { 0%,100% { box-shadow:0 0 0 0 rgba(201,168,76,0) } 50% { box-shadow:0 0 18px 4px rgba(201,168,76,0.25) } }
@keyframes zunIn { 0% { opacity:0; transform:scale(1.04) } 60% { opacity:1; transform:scale(0.98) } 100% { opacity:1; transform:scale(1) } }
@keyframes blackout { 0% { opacity:0 } 40% { opacity:1 } 100% { opacity:0 } }
@keyframes stampIn { 0% { opacity:0; transform:scale(2) rotate(-15deg) } 60% { opacity:1; transform:scale(0.9) rotate(3deg) } 100% { opacity:1; transform:scale(1) rotate(0deg) } }

* { box-sizing:border-box; margin:0; padding:0; }
html,body {
  height:100%;
  background:var(--ink); color:var(--washi);
  font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  /* iOSのスタンドアロン時のセーフエリア対応 */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  /* スタンドアロン起動時の上部背景 */
  background:linear-gradient(180deg, #5b9bd5 0%, #5b9bd5 env(safe-area-inset-top, 0), var(--ink) env(safe-area-inset-top, 0));
}
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--ink5); border-radius:2px; }

/* PWAインストール案内バナー */
#install-banner {
  position:fixed; bottom:env(safe-area-inset-bottom, 0); left:0; right:0;
  z-index:1000; padding:12px;
  animation:slideUp 0.4s ease;
}
.ib-inner {
  max-width:480px; margin:0 auto;
  background:#fff; border:1.5px solid var(--gold-lt); border-radius:16px;
  padding:14px 16px; display:flex; gap:12px; align-items:center;
  box-shadow:0 8px 24px rgba(91,155,213,0.25);
}
.ib-icon { font-size:30px; flex-shrink:0; }
.ib-text { flex:1; min-width:0; }
.ib-title { font-size:13.5px; font-weight:700; color:var(--washi); margin-bottom:2px; }
.ib-desc { font-size:11.5px; color:var(--washi2); line-height:1.5; }
.ib-close {
  background:transparent; border:none; color:var(--washi3);
  font-size:18px; cursor:pointer; padding:4px 8px; flex-shrink:0;
}

#app { display:flex; flex-direction:column; min-height:100vh; max-width:480px; margin:0 auto; }

#hdr { position:sticky; top:0; z-index:100; background:var(--ink2); border-bottom:1px solid var(--ink4); padding:0 18px; display:flex; align-items:stretch; justify-content:space-between; flex-shrink:0; min-height:56px; box-shadow:0 1px 4px rgba(91,155,213,0.08); }
#hdr::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--gold), var(--mint), var(--shu-lt)); }
#hdr-left { display:flex; align-items:center; gap:10px; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; font-weight:700; font-size:17px; letter-spacing:0.5px; color:var(--washi); }
.hdr-mon { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 100%); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; box-shadow:0 2px 8px rgba(91,155,213,0.3); }
#hdr-right { display:flex; align-items:center; gap:8px; }
.badge { background:var(--mint); color:#fff; font-size:9px; font-weight:700; padding:3px 8px; border-radius:10px; letter-spacing:1px; }
#lang-btn,#back-btn { background:#fff; border:1.5px solid var(--ink4); border-radius:10px; padding:6px 12px; font-size:11.5px; cursor:pointer; font-family:inherit; color:var(--washi2); transition:all 0.2s; }
#lang-btn { color:var(--gold); font-weight:700; border-color:var(--gold-lt); }
#back-btn { color:var(--washi3); display:none; }

#content { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.btn-p { background:linear-gradient(135deg, var(--shu) 0%, var(--shu-lt) 100%); color:#fff; border:none; border-radius:14px; padding:14px 0; font-size:15px; font-weight:700; cursor:pointer; width:100%; font-family:inherit; box-shadow:0 4px 14px rgba(255,126,103,0.3); letter-spacing:0.5px; transition:transform 0.15s, box-shadow 0.2s; }
.btn-p:hover { box-shadow:0 6px 18px rgba(255,126,103,0.4); }
.btn-p:active { transform:translateY(1px); opacity:0.9; }
.btn-g { background:#fff; border:1.5px solid var(--ink4); border-radius:14px; padding:13px 0; font-size:13.5px; cursor:pointer; width:100%; font-family:inherit; color:var(--washi2); font-weight:500; transition:background 0.2s, border-color 0.2s; }
.btn-g:hover { background:var(--ink3); border-color:var(--ink5); }
.btn-s { background:var(--shu); color:#fff; border:none; border-radius:10px; padding:8px 14px; font-size:12.5px; cursor:pointer; font-weight:600; font-family:inherit; box-shadow:0 2px 8px rgba(255,126,103,0.25); }
.btn-send { background:linear-gradient(135deg, var(--shu) 0%, var(--shu-lt) 100%); color:#fff; border:none; border-radius:12px; padding:12px 18px; font-weight:700; cursor:pointer; font-size:14px; white-space:nowrap; font-family:inherit; flex-shrink:0; box-shadow:0 2px 8px rgba(255,126,103,0.25); }

.center { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--ink); }
.center-card { text-align:center; max-width:340px; animation:slideUp 0.5s ease; }
.big-emoji { font-size:56px; margin-bottom:14px; }
.c-title { font-size:22px; font-weight:700; margin-bottom:12px; line-height:1.5; color:var(--washi); font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; letter-spacing:0.5px; }
.c-desc { font-size:13px; color:var(--washi2); line-height:1.8; margin-bottom:28px; }
.step-badge { font-size:11px; color:var(--gold); font-weight:700; letter-spacing:2px; margin-bottom:16px; }

#article { flex:1; overflow-y:auto; padding-bottom:32px; background:var(--ink); }
.art-header { padding:20px 18px 0; border-bottom:1px solid var(--ink4); }
.art-tag { display:inline-block; background:var(--shu); color:#fff; font-size:9px; font-weight:900; letter-spacing:2px; padding:3px 10px; border-radius:2px; margin-bottom:12px; }
.art-title { font-size:18px; font-weight:900; line-height:1.6; margin-bottom:14px; color:var(--washi); font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; letter-spacing:0.5px; }
.author-row { display:flex; align-items:center; gap:9px; padding-bottom:16px; }
.author-av { width:34px; height:34px; border-radius:50%; background:radial-gradient(circle, var(--gold-lt) 0%, var(--gold) 60%, #8b6914 100%); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.author-name { font-size:13px; font-weight:700; color:var(--washi); }
.author-date { font-size:10px; color:var(--washi3); }
.art-body { padding:18px 18px 0; }
.art-lead { font-size:13.5px; line-height:1.9; color:var(--washi2); margin-bottom:14px; }
.art-hint { background:var(--ink3); border:1px solid rgba(201,168,76,0.2); border-radius:8px; padding:10px 13px; margin-bottom:18px; font-size:11.5px; color:var(--washi3); display:flex; gap:8px; }

.trials { padding:0 18px; display:flex; flex-direction:column; gap:12px; }
.trial-card { background:var(--ink2); border:1px solid var(--ink4); border-radius:4px; overflow:hidden; transition:border-color 0.25s; position:relative; }
.trial-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--ink5); transition:background 0.3s; }
.trial-card.open::before { background:var(--gold); }
.trial-card.cleared::before { background:var(--shu); }
.trial-hdr { padding:16px 16px 16px 20px; cursor:pointer; display:flex; gap:13px; align-items:center; }
.trial-num { font-size:10px; font-weight:900; color:var(--gold); letter-spacing:2px; margin-bottom:3px; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; }
.trial-card.cleared .trial-num { color:var(--shu); }
.trial-cmd { font-size:15px; font-weight:900; color:var(--washi); font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; letter-spacing:0.5px; }
.trial-arrow { font-size:16px; color:var(--ink5); transition:transform 0.25s; margin-left:auto; flex-shrink:0; }
.trial-card.open .trial-arrow { transform:rotate(90deg); color:var(--gold); }
.trial-body { padding:0 20px 16px; border-top:1px solid var(--ink4); animation:zunIn 0.3s ease; }
.trial-quote { font-size:12.5px; color:var(--washi3); line-height:1.75; padding:12px 0 14px; border-bottom:1px solid var(--ink4); margin-bottom:14px; font-style:italic; border-left:3px solid var(--gold); padding-left:12px; }

.stamp { position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; background:var(--shu); color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:900; animation:stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 0 12px rgba(192,57,43,0.6); border:2px solid #e74c3c; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; }

.prog-row { padding:18px 18px 0; display:flex; gap:6px; align-items:center; }
.prog-bar { height:3px; flex:1; border-radius:2px; background:var(--ink4); transition:background 0.4s; }
.prog-count { font-size:10px; color:var(--washi3); margin-left:6px; white-space:nowrap; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; letter-spacing:1px; }

.cta-box { margin:20px 18px 0; background:linear-gradient(135deg, var(--ink2), var(--ink3)); border:1px solid rgba(201,168,76,0.4); border-radius:14px; padding:22px 18px; animation:fadeUp 0.5s ease; text-align:center; box-shadow:inset 0 1px 0 rgba(201,168,76,0.2), 0 4px 24px rgba(0,0,0,0.4); }
.cta-emoji { font-size:36px; margin-bottom:10px; }
.cta-title { font-size:17px; font-weight:900; margin-bottom:8px; color:var(--washi); font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; letter-spacing:1px; }
.cta-desc { font-size:12.5px; color:var(--washi3); line-height:1.75; margin-bottom:18px; }
.cta-zero { font-size:10.5px; color:var(--washi3); margin-top:10px; }

.hold-btn-wrap { position:relative; overflow:hidden; border-radius:8px; }
.hold-btn { position:relative; z-index:1; width:100%; padding:18px 0; font-size:16px; font-weight:700; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; letter-spacing:1px; cursor:pointer; border:2px solid var(--shu); background:#fff; color:var(--shu); border-radius:14px; overflow:hidden; transition:color 0.3s, box-shadow 0.3s; user-select:none; -webkit-user-select:none; box-shadow:0 4px 12px rgba(255,126,103,0.2); }
.hold-btn:hover { box-shadow:0 6px 16px rgba(255,126,103,0.3); }
.hold-btn.filling { color:var(--ink); }
.hold-btn-fill { position:absolute; left:0; top:0; height:100%; width:0%; background:linear-gradient(90deg, var(--shu-lt), var(--shu)); z-index:0; pointer-events:none; transition:none; }
.hold-btn.filling { color:#fff !important; }
.hold-btn-text { position:relative; z-index:1; }
.hold-hint { font-size:11px; color:var(--washi3); text-align:center; margin-top:8px; }

.skip-link { text-align:center; margin-top:10px; }
.skip-link button { background:transparent; border:none; color:var(--washi3); font-size:11.5px; cursor:pointer; font-family:inherit; text-decoration:underline; padding:4px 8px; }

#blackout { position:fixed; inset:0; background:#000; z-index:999; pointer-events:none; opacity:0; }
#blackout.active { animation:blackout 0.6s ease forwards; }

.sensei-bubble { margin:16px 18px 0; background:var(--ink2); border:1px solid rgba(201,168,76,0.3); border-radius:12px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; animation:zunIn 0.4s ease; }
.sensei-av { width:40px; height:40px; border-radius:50%; flex-shrink:0; background:radial-gradient(circle, var(--gold-lt) 0%, var(--gold) 60%, #8b6914 100%); display:flex; align-items:center; justify-content:center; font-size:20px; }
.sensei-inner { flex:1; }
.sensei-name { font-size:10px; color:var(--gold); font-weight:700; letter-spacing:1.5px; margin-bottom:4px; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; }
.sensei-text { font-size:13px; color:var(--washi2); line-height:1.7; font-style:italic; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; }

.art-footer { padding:28px 18px 0; border-top:1px solid var(--ink4); margin-top:32px; }
.art-footer-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.art-footer-av { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 100%); display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 2px 8px rgba(91,155,213,0.2); }
.art-footer-name { font-size:13.5px; font-weight:700; color:var(--washi); }
.art-footer-desc { font-size:11px; color:var(--washi3); }
.art-footer-cta { font-size:12.5px; color:var(--washi2); line-height:1.75; }
.support-box { margin-top:16px; background:#fff5f0; border:1.5px solid var(--shu-lt); border-radius:14px; padding:14px 16px; box-shadow:0 2px 8px rgba(255,126,103,0.1); }
.support-box-title { font-size:13px; color:var(--shu); font-weight:700; margin-bottom:4px; }
.support-box-desc { font-size:12px; color:var(--washi2); line-height:1.7; }
.terms-link { margin-top:12px; font-size:11px; }
.terms-link a { color:var(--ink5); text-decoration:none; }

.demo-chat { display:flex; flex-direction:column; gap:10px; }
.bubble-row { display:flex; gap:8px; align-items:flex-start; animation:slideIn 0.3s ease; }
.bubble-row.right { justify-content:flex-end; }
.bubble-av { font-size:20px; flex-shrink:0; }
.bubble-name { font-size:10px; font-weight:700; margin-bottom:2px; }
.bubble { padding:9px 13px; max-width:250px; font-size:12.5px; line-height:1.65; border-radius:3px 12px 12px 12px; }
.bubble.them { background:var(--ink3); color:var(--washi2); border:1px solid var(--ink5); }
.bubble.me { background:var(--shu); color:#fff; border-radius:12px 3px 12px 12px; }
.typing { font-size:11px; color:var(--washi3); animation:blink 1s infinite; padding-left:28px; }
.spec-item { background:var(--ink3); border:1px solid var(--ink5); border-radius:10px; padding:11px 13px; display:flex; gap:11px; align-items:center; margin-bottom:9px; animation:fadeUp 0.4s ease both; }
.spec-icon { font-size:22px; flex-shrink:0; }
.spec-label { font-size:10px; color:var(--washi3); margin-bottom:2px; }
.spec-value { font-size:13px; color:var(--washi); }
.code-box { background:#0a0f0a; border:1px solid #1e2a1e; border-radius:10px; padding:12px 14px; font-family:monospace; font-size:11.5px; max-height:200px; overflow-y:auto; line-height:1.7; }
.code-cursor { color:var(--gold); animation:blink 0.6s infinite; }

#interview { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#prog-bar { height:4px; background:var(--ink4); flex-shrink:0; }
#prog-fill { height:100%; background:linear-gradient(90deg, var(--shu), var(--gold), var(--mint)); transition:width 0.5s; border-radius:0 2px 2px 0; }
#step-lbl { font-size:11px; color:var(--washi3); text-align:right; padding:6px 16px; letter-spacing:0.5px; flex-shrink:0; font-family:'Zen Maru Gothic','Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif; font-weight:500; }
#interview-top { display:flex; align-items:center; justify-content:space-between; padding:0 4px; flex-shrink:0; }
.back-q-btn { background:transparent; border:none; color:var(--gold); font-size:12px; font-weight:600; padding:8px 12px; cursor:pointer; font-family:inherit; border-radius:8px; transition:background 0.2s; }
.back-q-btn:hover { background:rgba(91,155,213,0.1); }
.back-q-btn:active { transform:translateY(1px); }
#messages { flex:1; overflow-y:auto; padding:20px 16px 16px; display:flex; flex-direction:column; gap:14px; -webkit-overflow-scrolling:touch; }
.msg-ai { display:flex; gap:9px; align-items:flex-start; animation:fadeUp 0.3s ease; }
.msg-user { display:flex; justify-content:flex-end; animation:fadeUp 0.3s ease; }
.msg-av { font-size:26px; flex-shrink:0; margin-top:3px; }
.msg-bubble-ai { background:#fff; border:1px solid var(--ink4); border-radius:4px 18px 18px 18px; padding:12px 14px; max-width:272px; font-size:13.5px; line-height:1.65; color:var(--washi); box-shadow:0 1px 4px rgba(91,155,213,0.08); }
.msg-bubble-user { background:linear-gradient(135deg, var(--shu) 0%, var(--shu-lt) 100%); border-radius:18px 4px 18px 18px; padding:12px 14px; max-width:272px; font-size:13.5px; line-height:1.65; color:#fff; box-shadow:0 2px 8px rgba(255,126,103,0.25); }
.msg-hint { font-size:11px; color:var(--washi3); margin-top:5px; margin-left:4px; }
#input-area { display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--ink4); background:#fff; flex-shrink:0; align-items:center; }
#chat-inp { flex:1; min-width:0; background:#fff; border:1.5px solid var(--ink4); border-radius:12px; color:var(--washi); padding:12px 14px; font-size:14px; outline:none; font-family:inherit; transition:border-color 0.2s, box-shadow 0.2s; }
#chat-inp:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(91,155,213,0.15); }

#loading { flex:1; display:flex; align-items:center; justify-content:center; }
#loading-inner { text-align:center; max-width:300px; padding:20px; }
#loading-emoji { font-size:60px; margin-bottom:18px; display:inline-block; animation:pulse 1s infinite; }
#loading-text { font-size:15.5px; font-weight:700; margin-bottom:22px; min-height:50px; line-height:1.6; color:var(--washi); }
#loading-dots { display:flex; gap:5px; justify-content:center; margin-bottom:18px; }
.ldot { width:8px; height:8px; border-radius:50%; background:var(--ink4); transition:background 0.3s; }
.ldot.on { background:var(--gold); box-shadow:0 0 8px rgba(91,155,213,0.5); }
#loading-sub { font-size:11px; color:var(--washi3); }

async function callBackend(ans) {
  if (!BACKEND_URL) return mockGen(ans);
  var res = await fetch(BACKEND_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers: ans, userToken: getUserToken() })
  });
  if (res.status === 429) { var d = await res.json().catch(function() { return {}; }); throw new Error(d.error === 'RATE_LIMIT_USER' ? 'RATE_LIMIT_USER' : 'RATE_LIMIT'); }
  if (res.status === 403) throw new Error('CAPTCHA_FAILED');
  if (!res.ok) throw new Error('BACKEND_ERROR');
  var spec = await res.json();
  if (spec.status === 'ok') incRate();
  return spec;
}

  if (view === 'dojo' && phase === 'interview' && messages && messages.length > 0) {
    var oldT = T[oldLang], newT = T[lang];
    var newMessages = [];
    var qStep = 0; // 何問目のAI質問を表示中か
    var fixedCount = oldT.questions.length;
    for (var i = 0; i < messages.length; i++) {
      var m = messages[i];
      if (m.from === 'user') {
        // ユーザー回答はそのまま
        newMessages.push(m);
        qStep++;
      } else {
        // AIメッセージを翻訳
        var translated = translateAiMessage(m, oldLang, qStep);
        newMessages.push(translated);
      }
    }
    messages = newMessages;
    // 動的追加質問も新言語に置き換え
    regenerateExtraQuestionsIfNeeded();
    saveProgress({ stage:'interview', qIndex:qIndex, answers:answers, messages:messages, extraQuestions:extraQuestions });
  }

  render();
}

// AIメッセージを旧言語→新言語に翻訳
// 質問テキスト・ヒントは質問IDで照合、それ以外（おかえり、もう少し詳しく等）は固定文言で照合
function translateAiMessage(m, oldLang, qStep) {
  var oldT = T[oldLang], newT = T[lang];
  var oldQs = oldT.questions, newQs = newT.questions;
  // 固定質問の照合
  for (var i = 0; i < oldQs.length; i++) {
    if (m.text === oldQs[i].text) {
      return { from:'ai', text:newQs[i].text, hint:newQs[i].hint };
    }
  }
  // 動的追加質問の照合（id基準）
  // ※extraQuestionsは現在の言語で生成されているので、idで言語切替時の対応文を引き当てる
  // → 簡易対応：buildExtraQuestionsを再実行して新言語の追加質問を生成
  var newExtras = buildExtraQuestions(answers);
  for (var j = 0; j < extraQuestions.length; j++) {
    if (m.text === extraQuestions[j].text) {
      // 同じidの新言語版を探す
      var matchedNew = newExtras.find(function(e) { return e.id === extraQuestions[j].id; });
      if (matchedNew) {
        return { from:'ai', text:matchedNew.text, hint:matchedNew.hint };
      }
    }
  }
  // 固定文言の照合
  if (m.text === oldT.resumeMsg) return { from:'ai', text:newT.resumeMsg, hint:null };
  if (m.text === oldT.doneMsg) return { from:'ai', text:newT.doneMsg, hint:null, isLast:m.isLast };
  if (m.text === oldT.redirectMsg) return { from:'ai', text:newT.redirectMsg, hint:newT.redirectHint, isRedirect:true };
  // 「もう少し詳しく」系の前置き
  if (m.text === '✨ もう少し詳しく教えてください。' || m.text === '✨ One more detail.') {
    return { from:'ai', text:(lang === 'ja' ? '✨ もう少し詳しく教えてください。' : '✨ One more detail.'), hint:null };
  }
  // 「もう一度、最後の質問からやり直しましょう」系
  if (m.text === '✨ もう一度、最後の質問からやり直しましょう。' || m.text === '✨ Let\u0027s redo the last question.') {
    return { from:'ai', text:(lang === 'ja' ? '✨ もう一度、最後の質問からやり直しましょう。' : '✨ Let\u0027s redo the last question.'), hint:null };
  }
  // 翻訳できないものはそのまま返す（フォールバック）
  return m;
}

// 動的追加質問も言語に応じて再生成（extraQuestionsを更新）
function regenerateExtraQuestionsIfNeeded() {
  if (extraQuestions.length === 0) return;
  var newExtras = buildExtraQuestions(answers);
  // idベースで対応する新言語版に置き換え
  extraQuestions = extraQuestions.map(function(eq) {
    var found = newExtras.find(function(e) { return e.id === eq.id; });
    return found || eq;
  });
}

function showDojo() {
  view = 'dojo';
  document.getElementById('back-btn').style.display = '';
  document.getElementById('back-btn').textContent = t().backToArticle;
  var saved = loadProgress();
  if (saved && saved.stage === 'result' && saved.app) {
    genApp = saved.app; answers = saved.answers || {}; phase = 'result';
  } else if (saved && (saved.stage === 'interview' || saved.stage === 'loading') && saved.answers) {
    // 古い保存形式（messages不在）の場合は破棄して最初から
    if (!saved.messages || saved.messages.length === 0) {
      clearProgress();
      phase = 'welcome';
      render();
      return;
    }
    answers = saved.answers;
    qIndex = saved.qIndex || 0;
    extraQuestions = saved.extraQuestions || [];
    messages = saved.messages.slice();
    // 「おかえり！」を最後のAI質問の直前に挿入（重複防止）
    var hasResumeMsg = messages.some(function(m) { return m.from === 'ai' && m.text === t().resumeMsg; });
    if (!hasResumeMsg) {
      var lastAiIdx = -1;
      for (var i = messages.length - 1; i >= 0; i--) {
        if (messages[i].from === 'ai') { lastAiIdx = i; break; }
      }
      if (lastAiIdx >= 0) {
        messages.splice(lastAiIdx, 0, { from:'ai', text:t().resumeMsg, hint:null });
      } else {
        messages.unshift({ from:'ai', text:t().resumeMsg, hint:null });
      }
    }
    if (saved.stage === 'loading') {
      setTimeout(function() {
        addMsg('ai', t().doneMsg, null, false, true);
        phase = 'interview'; render();
        setTimeout(function() { phase = 'loading'; loadStep = 0; saveProgress({ stage:'loading', answers:answers, qIndex:qIndex, messages:messages, extraQuestions:extraQuestions }); render(); startLoading(); }, 1200);
      }, 600);
    }
    phase = 'interview';
  } else { phase = 'welcome'; }
  render();
}

function render() {
  var c = document.getElementById('content');
  if (view === 'article') { c.innerHTML = renderArticle(); bindArticle(); return; }
  if (phase === 'welcome') { c.innerHTML = renderWelcome(); return; }
  if (phase === 'interview') { c.innerHTML = renderInterview(); bindInterview(); scrollBottom(); return; }
  if (phase === 'loading') { c.innerHTML = renderLoading(); return; }
  if (phase === 'confirm') { c.innerHTML = renderConfirm(); return; }
  if (phase === 'result') { c.innerHTML = renderResult(); return; }
  if (phase === 'hold') { c.innerHTML = renderHold(); return; }
  if (phase === 'blocked') { c.innerHTML = renderBlocked(); return; }
  if (phase === 'rateLimit') { c.innerHTML = renderRateLimit(); return; }
  c.innerHTML = renderError();
}

function startHold() {
  var btn = document.getElementById('hold-btn');
  var fill = document.getElementById('hold-fill');
  if (!btn || !fill) return;
  var start = Date.now();
  var duration = 1500;
  btn.classList.add('filling');
  if (holdInterval) clearInterval(holdInterval);
  holdInterval = setInterval(function() {
    var elapsed = Date.now() - start;
    var pct = Math.min(elapsed / duration * 100, 100);
    fill.style.width = pct + '%';
    if (pct >= 100) {
      cancelHold();
      if (navigator.vibrate) { try { navigator.vibrate(50); } catch(e) {} }
      zunTransition(function() { showDojo(); });
    }
  }, 16);
}

function cancelHold() {
  if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
  var btn = document.getElementById('hold-btn');
  var fill = document.getElementById('hold-fill');
  if (btn) btn.classList.remove('filling');
  if (fill) {
    fill.style.transition = 'width 0.3s ease';
    fill.style.width = '0%';
    setTimeout(function() { if (fill) fill.style.transition = 'none'; }, 350);
  }
}

function zunTransition(callback) {
  var el = document.getElementById('blackout');
  if (!el) { callback(); return; }
  el.classList.add('active');
  setTimeout(function() { callback(); }, 300);
  setTimeout(function() { el.classList.remove('active'); }, 600);
}

function toggleRound(id) {
  var wasOpen = (openRound === id);
  openRound = wasOpen ? null : id;
  if (!wasOpen && !readRounds[id]) {
    readRounds[id] = true;
    readCount = Object.keys(readRounds).length;
    demoShown[id] = 0;
  }
  render();
  if (!wasOpen) startDemoAnim(id);
}

function skipAll() {
  ROUNDS.forEach(function(r) { readRounds[r.id] = true; });
  readCount = ROUNDS.length;
  render();
  setTimeout(function() { zunTransition(function() { showDojo(); }); }, 300);
}

}

function startDemoAnim(id) {
  var r = null;
  for (var i = 0; i < ROUNDS.length; i++) { if (ROUNDS[i].id === id) { r = ROUNDS[i]; break; } }
  if (!r) return;
  if (demoTimers[id]) clearInterval(demoTimers[id]);
  var max = (r.type === 'code') ? r.codeLines.length : (r.exchanges ? r.exchanges.length : 0);
  if (!max) return;
  var interval = (r.type === 'code') ? 75 : 880;
  demoTimers[id] = setInterval(function() {
    demoShown[id] = (demoShown[id] || 0) + 1;
    var el = document.getElementById('demo-' + id);
    if (el) el.innerHTML = renderDemo(r);
    if (demoShown[id] >= max) { clearInterval(demoTimers[id]); delete demoTimers[id]; }
  }, interval);
}

function startInterview() {
  qIndex = 0; answers = {}; messages = [];
  extraQuestions = [];
  addMsg('ai', t().questions[0].text, t().questions[0].hint);
  phase = 'interview'; render();
}

function addMsg(from, text, hint, isRedirect, isLast) {
  messages.push({ from:from, text:text, hint:hint, isRedirect:isRedirect, isLast:isLast });
}

function renderInterview() {
  var activeQs = getActiveQuestions();
  var pct = Math.round((qIndex + 1) / activeQs.length * 100);
  var lastMsg = messages[messages.length - 1];
  var inputOff = lastMsg && (lastMsg.isLast || lastMsg.isRedirect);
  var msgsHTML = messages.map(function(m) {
    if (m.from === 'ai') {
      var lines = m.text.split('\n').map(function(l) { return '<p style="margin-bottom:2px">' + l + '</p>'; }).join('');
      var hint = m.hint ? '<div class="msg-hint">💡 ' + m.hint + '</div>' : '';
      var redir = m.isRedirect ? '<button class="btn-s" style="margin-top:9px" onclick="continueRedirect()">' + t().redirectBtn + '</button>' : '';
      return '<div class="msg-ai"><div class="msg-av">🤖</div><div><div class="msg-bubble-ai">' + lines + '</div>' + hint + redir + '</div></div>';
    } else {
      return '<div class="msg-user"><div class="msg-bubble-user">' + m.text + '</div></div>';
    }
  }).join('');
  var ph = activeQs[Math.min(qIndex, activeQs.length - 1)].ph;
  // 固定質問中 / 追加質問中 で表示変える
  var isExtra = qIndex >= t().questions.length;
  var stepLbl;
  if (isExtra) {
    stepLbl = (lang === 'ja' ? '深掘り ' + (qIndex - t().questions.length + 1) + ' / ' + extraQuestions.length : 'Deepen ' + (qIndex - t().questions.length + 1) + ' / ' + extraQuestions.length);
  } else {
    stepLbl = (lang === 'ja' ? '質問 ' + (qIndex + 1) + ' / ' + t().questions.length : 'Q ' + (qIndex + 1) + ' / ' + t().questions.length);
  }
  var inputHTML = !inputOff ? '<div id="input-area"><input id="chat-inp" placeholder="' + ph + '" onkeydown="handleKey(event)" oncompositionstart="isComposing=true" oncompositionend="isComposing=false"><button class="btn-send" onclick="sendMsg()">' + t().send + '</button></div>' : '';

  // 1問目以外なら「前の質問に戻る」ボタンを表示
  var canGoBack = (qIndex > 0);
  var backBtnHTML = canGoBack
    ? '<button class="back-q-btn" onclick="goBackQuestion()">' + (lang === 'ja' ? '← 前の質問に戻る' : '← Previous') + '</button>'
    : '<span></span>';

  return '<div id="interview">' +
    '<div id="prog-bar"><div id="prog-fill" style="width:' + pct + '%"></div></div>' +
    '<div id="interview-top">' + backBtnHTML + '<div id="step-lbl">' + stepLbl + '</div></div>' +
    '<div id="messages">' + msgsHTML + '<div id="msg-btm"></div></div>' +
    inputHTML +
    '</div>';
}

// 1つ前の質問に戻る
function goBackQuestion() {
  if (qIndex <= 0) return;
  // 後ろから探して、最後のユーザーメッセージの位置で切る（その後ろのAI質問も含めて削除）
  var i = messages.length - 1;
  while (i >= 0 && messages[i].from === 'ai') i--;
  if (i >= 0) {
    messages = messages.slice(0, i);
  }
  // 戻る先のqIndexと、その前のユーザー回答も削除
  qIndex = qIndex - 1;
  var activeQs = getActiveQuestions();
  var prevQ = activeQs[qIndex];
  if (prevQ && answers[prevQ.id]) {
    delete answers[prevQ.id];
  }
  // 戻った先が固定質問になったら追加質問はリセット
  if (qIndex < t().questions.length) {
    extraQuestions = [];
  }
  // messagesから戻る先の質問より後のAI質問とユーザー回答を全部消したので、
  // 戻る先の質問のメッセージも消えている可能性がある。
  // → 戻る先の質問を改めて表示する
  // messagesの最後がユーザー回答ならその後ろにAI質問が必要
  // messagesが空ならAI質問をひとつ追加
  // とりあえずmessagesが空、または最後がユーザー回答なら、戻る先の質問を追加
  var lastMsg = messages[messages.length - 1];
  if (!lastMsg || lastMsg.from === 'user') {
    var curQ = activeQs[qIndex];
    if (curQ) {
      messages.push({ from:'ai', text:curQ.text, hint:curQ.hint });
    }
  }
  saveProgress({ stage:'interview', qIndex:qIndex, answers:answers, messages:messages, extraQuestions:extraQuestions });
  render();
}

function scrollBottom() {

      lastAi.scrollIntoView({ behavior:'smooth', block:'start' });

      msgs.scrollTop = msgs.scrollHeight;

function handleKey(e) {
  if (e.key === 'Enter' && !isComposing) sendMsg();
}

function sendMsg() {
  var inp = document.getElementById('chat-inp');
  if (!inp || !inp.value.trim()) return;
  var val = inp.value.trim();

  if (/みんなで|複数人|他人と|グループで|リアルタイムで共有|multi.user|share with team/i.test(val)) {
    addMsg('user', val);
    addMsg('ai', t().redirectMsg, t().redirectHint, true);
    saveProgress({ stage:'interview', qIndex:qIndex, answers:answers, messages:messages, extraQuestions:extraQuestions });
    phase = 'interview'; render(); return;
  }

  // 固定質問 or 動的追加質問に回答を保存
  var activeQs = getActiveQuestions();
  var q = activeQs[qIndex];
  answers[q.id] = val;
  addMsg('user', val);
  var next = qIndex + 1;

  // 固定4問が全部終わったら追加質問の判定
  if (next === t().questions.length && extraQuestions.length === 0) {
    extraQuestions = buildExtraQuestions(answers);
  }

  // 全質問（固定＋追加）完了チェック
  var totalQs = t().questions.length + extraQuestions.length;
  if (next >= totalQs) {
    if (checkRate()) {
      addMsg('ai', lang === 'ja' ? '本日のご利用回数に達しました。また明日試してみてください 😊' : 'Daily limit reached. Come back tomorrow 😊');
      phase = 'interview'; render(); return;
    }
    // 作れない機能をチェック
    featureWarnings = detectUnsupportedFeatures(answers);
    if (featureWarnings.length > 0) {
      // 確認画面に遷移
      saveProgress({ stage:'interview', qIndex:qIndex, answers:answers, messages:messages, extraQuestions:extraQuestions });
      phase = 'interview'; render();
      setTimeout(function() { phase = 'confirm'; render(); }, 600);
      return;
    }
    addMsg('ai', t().doneMsg, null, false, true);
    saveProgress({ stage:'interview', qIndex:qIndex, answers:answers, messages:messages, extraQuestions:extraQuestions });
    phase = 'interview'; render();
    setTimeout(function() { phase = 'loading'; loadStep = 0; saveProgress({ stage:'loading', answers:answers, qIndex:qIndex, messages:messages, extraQuestions:extraQuestions }); render(); startLoading(); }, 1400);
  } else {
    qIndex = next;
    var nextQ = getActiveQuestions()[next];
    // 追加質問なら師範風の前置きを添える
    var isExtra = next >= t().questions.length;
    if (isExtra) {
      addMsg('ai', (lang === 'ja' ? '✨ もう少し詳しく教えてください。' : '✨ One more detail.'), null);
    }
    addMsg('ai', nextQ.text, nextQ.hint);
    saveProgress({ stage:'interview', qIndex:qIndex, answers:answers, messages:messages, extraQuestions:extraQuestions });
    phase = 'interview'; render();
  }
}

// 現在有効な質問リスト（固定＋動的追加）
function getActiveQuestions() {
  return t().questions.concat(extraQuestions);
}

// 回答内容から動的追加質問を生成
// ※ 本物AIが来るまでのモック実装
// ※ バックエンド実装後はClaude APIに判定を移譲
function buildExtraQuestions(ans) {
  var isJa = (lang === 'ja');
  var extras = [];
  var want = (ans.want || '').toLowerCase();
  var input = (ans.input || '').toLowerCase();
  var problem = (ans.problem || '').toLowerCase();

  // 【追加質問1】日付・期限系のアプリで「開始日」が不明な場合
  var hasDateLike = /切れ|期限|残り|日数|日付|いつ|予定|締切|runs?\s*out|expire|deadline|days?\s*left/i.test(want + ' ' + problem);
  var hasStartDate = /開始|もらった|処方|今日|受け取|購入|買った|start|received|prescribed/i.test(input);
  if (hasDateLike && !hasStartDate) {
    extras.push({
      id: 'start_date',
      text: isJa
        ? '🗓️ 日付の計算に使う「開始日」はどう決めますか？'
        : '🗓️ How do you set the start date for the countdown?',
      ph: isJa ? '例：入力した日を開始日にする／手動で入れる' : 'e.g. Use today as start, or enter manually',
      hint: isJa ? '迷ったら「入力した日から数える」でOK' : 'If unsure, "count from today" works fine'
    });
  }

  // 【追加質問2】複数管理が必要そうなのに「1つだけ」か不明な場合
  var multiHint = /複数|いくつ|それぞれ|種類|一覧|リスト|multi|several|each|list/i.test(input + ' ' + want);
  var isSingleClear = /ひとつ|一つ|1つ|単体|single|one only/i.test(input + ' ' + want);
  if (multiHint && !isSingleClear) {
    extras.push({
      id: 'multi_items',
      text: isJa
        ? '📂 複数登録した時、それぞれ別々に管理しますか？まとめて1つ？'
        : '📂 When you register multiple items, manage them separately or as one?',
      ph: isJa ? '例：別々に管理したい／まとめて1つでOK' : 'e.g. Separate items, or grouped',
      hint: isJa ? 'お薬なら「別々に」が一般的です' : 'For meds, "separately" is common'
    });
  }

  // 【追加質問3】警告・通知系の閾値が不明な場合
  var needsWarning = /少なく|警告|教え|通知|アラート|残り|注意|warn|alert|remind|low|running/i.test(want);
  var hasThreshold = /日前|日後|日に|%|パーセント|個|時間|days?\s*before|%|weeks?/i.test(want);
  if (needsWarning && !hasThreshold) {
    extras.push({
      id: 'warning_threshold',
      text: isJa
        ? '🔔 残り何日（または何個）になったら警告を出しますか？'
        : '🔔 At what threshold should the warning trigger?',
      ph: isJa ? '例：残り7日になったら／残り3個になったら' : 'e.g. 7 days left, or 3 items left',
      hint: isJa ? 'ざっくりでOK。後で変えられます' : 'Rough is fine. Adjustable later'
    });
  }

  // 【追加質問4】画面に表示したい情報の優先順位が不明
  // （入力が3つ以上ある時のみ）
  var inputCount = (input.match(/[、,]/g) || []).length + 1;
  if (inputCount >= 3 && extras.length < 3) {
    extras.push({
      id: 'display_priority',
      text: isJa
        ? '👀 メイン画面で一番大きく見せたいのは何ですか？'
        : '👀 What should be the biggest thing on the main screen?',
      ph: isJa ? '例：残り日数を一番大きく／薬の名前を目立たせる' : 'e.g. Days left biggest, or item name prominent',
      hint: isJa ? '一番大事な1つだけ選んでください' : 'Pick just ONE most important thing'
    });
  }

  // 最大4問まで
  return extras.slice(0, 4);
}

// 作れない機能を検出して警告リストを返す
// 各項目：{ type, detected, canReplace, replaceWith }
function detectUnsupportedFeatures(ans) {
  var all = Object.values(ans).join(' ').toLowerCase();
  var isJa = (lang === 'ja');
  var warnings = [];

  // ① プッシュ通知（アプリ閉じてても通知）
  if (/プッシュ通知|閉じ(て|ていて).*(通知|アラート|お知らせ)|バックグラウンド.*通知|push notification|background notif/i.test(all) ||
      (/(通知|アラーム|リマインド|お知らせ|アラート|rem(ind|inder)|alarm|notify)/i.test(all) &&
       /毎朝|毎日|定時|毎週|every\s*(day|morning|week)|at\s*\d/i.test(all))) {
    warnings.push({
      type: 'push_notification',
      cantDoJa: 'アプリを閉じていても自動で通知を送る',
      cantDoEn: 'Send notifications while the app is closed',
      replaceJa: 'アプリを開いた時に残り日数や状態を大きく表示し、少なくなったら画面が赤くなって警告',
      replaceEn: 'Show remaining days prominently when you open the app, with red warning when low',
      canReplace: true
    });
  }

  // ② 複数人共有・チーム機能
  if (/みんなで|複数人|他人と|グループで|チーム|共有|シェア|家族と|友達と|multi.user|share.*(with|between)|team|group/i.test(all)) {
    warnings.push({
      type: 'multi_user',
      cantDoJa: 'みんなでデータを共有する、チームで使う',
      cantDoEn: 'Share data between users, team features',
      replaceJa: '一人用のアプリとして作成します（データはあなたのスマホだけに保存）',
      replaceEn: 'Build as a solo app (data saved only on your phone)',
      canReplace: true
    });
  }

  // ③ 位置情報・GPS
  if (/位置情報|gps|現在地|地図で|マップで|どこに.*いる|location|map.*track/i.test(all)) {
    warnings.push({
      type: 'gps',
      cantDoJa: '位置情報やGPSで場所を自動取得する',
      cantDoEn: 'Auto-detect location via GPS',
      replaceJa: '場所は手動で入力する形にします',
      replaceEn: 'Location will be entered manually',
      canReplace: true
    });
  }

  // ④ カメラ・OCR・画像認識
  if (/カメラで.*読み取|写真.*認識|ocr|バーコード|qrコード.*読|画像.*分析|image.*recogn|scan.*(photo|image|code)/i.test(all)) {
    warnings.push({
      type: 'camera_ocr',
      cantDoJa: 'カメラで文字や画像を自動認識する',
      cantDoEn: 'Auto-recognize text or images via camera',
      replaceJa: '文字や情報は手入力する形にします',
      replaceEn: 'Text and info will be entered manually',
      canReplace: true
    });
  }

  // ⑤ 音声認識・音声入力
  if (/音声.*(入力|認識|読み上げ|録音)|声で|しゃべ(って|る)|voice.*(input|recog)|speech.*to.*text|record.*audio/i.test(all)) {
    warnings.push({
      type: 'voice',
      cantDoJa: '音声認識や音声入力',
      cantDoEn: 'Voice recognition or voice input',
      replaceJa: '文字での入力にします',
      replaceEn: 'Use text input instead',
      canReplace: true
    });
  }

  // ⑥ クラウド保存・他端末同期
  if (/クラウド|他の.*(端末|スマホ|機器).*同期|複数.*端末.*共有|cloud.*save|sync.*(device|phone)/i.test(all)) {
    warnings.push({
      type: 'cloud',
      cantDoJa: 'クラウド保存や他の端末との同期',
      cantDoEn: 'Cloud storage or sync with other devices',
      replaceJa: 'このスマホの中だけにデータを保存します',
      replaceEn: 'Data will be saved only on this phone',
      canReplace: true
    });
  }

  // ⑦ メール/SMS/LINE 送信
  if (/(メール|sms|line|ライン).*(送信|送る|飛ばす)|send.*(mail|sms|message)/i.test(all)) {
    warnings.push({
      type: 'messaging',
      cantDoJa: 'メールやSMS、LINEを自動で送信する',
      cantDoEn: 'Send emails, SMS, or messages automatically',
      replaceJa: '画面に表示するだけになります（手動でコピーして送ってください）',
      replaceEn: 'Will display on screen only (copy manually to send)',
      canReplace: true
    });
  }

  // ⑧ 外部API連携（天気・地図など）
  if (/天気.*(取得|表示|自動)|リアルタイム.*(株価|為替|ニュース)|外部.*(api|サービス).*連携|weather.*(api|auto)|real.*time.*(stock|news)/i.test(all)) {
    warnings.push({
      type: 'external_api',
      cantDoJa: '天気・株価・ニュースなど外部サービスの自動取得',
      cantDoEn: 'Auto-fetch weather, stocks, news from external services',
      replaceJa: '情報は手動で入力する形にします',
      replaceEn: 'Info will be entered manually',
      canReplace: true
    });
  }

  // ⑨ 課金・決済（完全NG、代替不可）
  if (/課金|決済|クレジットカード|サブスク|定期購入|payment|subscribe|credit.*card/i.test(all)) {
    warnings.push({
      type: 'payment',
      cantDoJa: 'アプリ内での課金や決済',
      cantDoEn: 'In-app payment or subscription',
      replaceJa: '',
      replaceEn: '',
      canReplace: false
    });
  }

  // ⑩ PDF生成・Excel出力・印刷
  if (/pdf.*(生成|出力|作成)|excel.*出力|印刷|プリント|pdf.*(export|generate)|excel.*export|print/i.test(all)) {
    warnings.push({
      type: 'file_export',
      cantDoJa: 'PDFやExcelの生成、印刷',
      cantDoEn: 'PDF/Excel generation, printing',
      replaceJa: '画面に表示する形にします（スクリーンショットで保存できます）',
      replaceEn: 'Will display on screen (save via screenshot)',
      canReplace: true
    });
  }

  // ⑪ バックグラウンド処理・自動実行
  if (/(アプリを?閉じ(た|て).*(後|も)|バックグラウンド).*自動|毎日.*自動(実行|処理)|auto.*(run|execute).*background/i.test(all)) {
    warnings.push({
      type: 'background',
      cantDoJa: 'アプリを閉じた後も自動で動き続ける',
      cantDoEn: 'Keep running after the app is closed',
      replaceJa: 'アプリを開いた時に日時から自動計算する形にします',
      replaceEn: 'Auto-calculate based on time when you open the app',
      canReplace: true
    });
  }

  // ⑫ 生体認証・Face ID
  if (/指紋|顔認証|face.*id|touch.*id|生体認証|biometric/i.test(all)) {
    warnings.push({
      type: 'biometric',
      cantDoJa: '指紋認証や顔認証',
      cantDoEn: 'Fingerprint or face authentication',
      replaceJa: 'パスコード入力での保護にします（またはロックなし）',
      replaceEn: 'Use passcode protection (or no lock)',
      canReplace: true
    });
  }

  // ⑬ 健康データ・歩数計連携
  if (/歩数|心拍|睡眠.*(データ|記録)|健康.*(アプリ|データ).*連携|health.*data|step.*count/i.test(all)) {
    warnings.push({
      type: 'health_data',
      cantDoJa: '歩数計や健康アプリのデータを自動取得',
      cantDoEn: 'Auto-fetch health/step data from other apps',
      replaceJa: '歩数や健康データは手動で記録する形にします',
      replaceEn: 'Record health data manually',
      canReplace: true
    });
  }

  return warnings;
}

function continueRedirect() {
  addMsg('ai', t().questions[qIndex].text, t().questions[qIndex].hint);
  phase = 'interview'; render();
}

function startLoading() {
  if (loadTimer) clearTimeout(loadTimer);
  tickLoader();
}

function tickLoader() {
  var msgs = t().loadingMsgs;
  if (loadStep >= msgs.length - 1) {
    loadTimer = setTimeout(async function() {
      try {
        var spec = await callBackend(answers);
        if (spec.status === 'hold') { holdMsg = spec.hold_reason || ''; phase = 'hold'; render(); return; }
        if (spec.status === 'blocked') { holdMsg = spec.blocked_reason || ''; phase = 'blocked'; render(); return; }
        genApp = spec;
        saveProgress({ stage:'result', answers:answers, app:spec });
        checkedItems = {};
        phase = 'result'; render();
      } catch(e) {
        if (e.message === 'RATE_LIMIT' || e.message === 'RATE_LIMIT_USER') phase = 'rateLimit';
        else phase = 'error';
        render();
      }
    }, 1800);
    return;
  }
  loadTimer = setTimeout(function() { loadStep++; updateLoadingUI(); tickLoader(); }, 1500);
}

function updateLoadingUI() {
  var msgs = t().loadingMsgs;
  var em = document.getElementById('loading-emoji');
  var tx = document.getElementById('loading-text');
  if (em) em.textContent = msgs[loadStep].icon;
  if (tx) tx.textContent = msgs[loadStep].text;
  var dots = document.querySelectorAll('.ldot');
  for (var i = 0; i < dots.length; i++) { dots[i].classList.toggle('on', i <= loadStep); }
}

function renderLoading() {
  var msgs = t().loadingMsgs;
  var dots = msgs.map(function(_, i) { return '<div class="ldot' + (i <= loadStep ? ' on' : '') + '"></div>'; }).join('');
  return '<div id="loading"><div id="loading-inner">' +
    '<div id="loading-emoji">' + msgs[loadStep].icon + '</div>' +
    '<div id="loading-text">' + msgs[loadStep].text + '</div>' +
    '<div id="loading-dots">' + dots + '</div>' +
    '<div id="loading-sub">' + t().loadingSub + '</div>' +
    '</div></div>';
}

// 作れない機能の確認画面

  var isJa = (lang === 'ja');
  var hasBlocker = featureWarnings.some(function(w) { return !w.canReplace; });

  var cantHTML = featureWarnings.map(function(w) {
    return '<div class="confirm-item"><span class="confirm-x">❌</span><span>' + (isJa ? w.cantDoJa : w.cantDoEn) + '</span></div>';
  }).join('');

  var replaceHTML = featureWarnings
    .filter(function(w) { return w.canReplace; })
    .map(function(w) {
      return '<div class="confirm-item confirm-ok"><span class="confirm-check">✅</span><span>' + (isJa ? w.replaceJa : w.replaceEn) + '</span></div>';
    }).join('');

  var title, subtitle, cantLabel, replaceLabel, btnConfirm, btnRetry;
  if (hasBlocker) {
    title = isJa ? '申し訳ありません 🙏' : 'Sorry 🙏';
    subtitle = isJa ? 'ご希望の機能の一部は、スマホだけで動くアプリでは実現できません。' : 'Some requested features cannot be built in a standalone phone app.';
    cantLabel = isJa ? 'できないこと' : 'Cannot do';
    btnConfirm = isJa ? 'それでもOK、作ってみる' : 'Build anyway';
    btnRetry = isJa ? '質問をやり直す' : 'Redo questions';
  } else {
    title = isJa ? '🙋 ちょっと確認させてください' : '🙋 Quick check';
    subtitle = isJa ? 'スマホだけで動くアプリの制約で、一部の機能は代わりのやり方になります。' : 'Due to standalone app constraints, some features will be adjusted.';
    cantLabel = isJa ? 'できないこと' : 'Cannot do';
    replaceLabel = isJa ? '代わりにこうします' : 'Instead, we will';
    btnConfirm = isJa ? 'はい、これで作る ✨' : 'OK, build it ✨';
    btnRetry = isJa ? '質問をやり直す' : 'Redo questions';
  }

  return '<div class="confirm-screen">' +
    '<div class="confirm-card">' +
    '<div class="confirm-emoji">' + (hasBlocker ? '🙏' : '🙋') + '</div>' +
    '<div class="confirm-title">' + title + '</div>' +
    '<div class="confirm-sub">' + subtitle + '</div>' +
    '<div class="confirm-section">' +
    '<div class="confirm-section-label">' + cantLabel + '</div>' +
    cantHTML +
    '</div>' +
    (replaceHTML ? '<div class="confirm-section"><div class="confirm-section-label">' + replaceLabel + '</div>' + replaceHTML + '</div>' : '') +
    (!hasBlocker ? '<button class="btn-p" onclick="confirmContinue()">' + btnConfirm + '</button>' : '<button class="btn-g" onclick="confirmRetry()">' + btnRetry + '</button>') +
    (!hasBlocker ? '<button class="btn-g" style="margin-top:10px" onclick="confirmRetry()">' + btnRetry + '</button>' : '') +
    '</div>' +
    '</div>';
}

// 確認画面で「作る」を押したとき
function confirmContinue() {
  // 代替案を answers に記録しておく（AIに渡せる形で）
  answers._feature_replacements = featureWarnings
    .filter(function(w) { return w.canReplace; })
    .map(function(w) { return { cant: w.cantDoJa, replaceWith: w.replaceJa }; });
  addMsg('ai', t().doneMsg, null, false, true);
  phase = 'interview'; render();
  setTimeout(function() { phase = 'loading'; loadStep = 0; saveProgress({ stage:'loading', answers:answers, qIndex:qIndex, messages:messages, extraQuestions:extraQuestions }); render(); startLoading(); }, 1400);
}

// 確認画面で「やり直す」を押したとき
function confirmRetry() {
  // 最後の固定質問からやり直す
  featureWarnings = [];
  qIndex = t().questions.length - 1; // 最後の質問に戻る
  messages = messages.slice(0, -2); // 最後の問答を1組戻す
  addMsg('ai', (lang === 'ja' ? '✨ もう一度、最後の質問からやり直しましょう。' : '✨ Let\u0027s redo the last question.'), null);
  addMsg('ai', t().questions[qIndex].text, t().questions[qIndex].hint);
  phase = 'interview'; render();
}

function toggleCheck(i) {
  checkedItems[i] = !checkedItems[i];
  if (genApp) { try { localStorage.setItem(genApp.storage_key, JSON.stringify(checkedItems)); } catch(e) {} }
  var c = document.getElementById('content');
  c.innerHTML = renderResult();
}

function getBugText() {
  if (bugPhase === 'fixing') return t().bugFixing;
  if (bugPhase === 'fixed') return t().bugFixed;
  return t().bugIdle;
}

function handleBug() {
  if (bugPhase !== 'idle') return;
  bugPhase = 'fixing';
  document.getElementById('content').innerHTML = renderResult();
  if (bugTimer) clearTimeout(bugTimer);
  bugTimer = setTimeout(function() {
    bugPhase = 'fixed';
    document.getElementById('content').innerHTML = renderResult();
    bugTimer = setTimeout(function() {
      bugPhase = 'idle';
      document.getElementById('content').innerHTML = renderResult();
    }, 3000);
  }, 2500);
}

}

render();

// Service Worker 登録（PWA化）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.log('SW registration failed:', err);
    });
  });
}

// PWA：iPhone Safariの「ホーム画面に追加」案内（初回のみ）
function checkInstallPrompt() {
  // すでにインストール済み or ジャンル外なら何もしない
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  if (window.navigator.standalone === true) return;
  // iOS Safari判定
  var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (!isIOS) return;
  // 1度案内したら出さない
  try {
    if (localStorage.getItem('dojo_install_shown') === '1') return;
    localStorage.setItem('dojo_install_shown', '1');
  } catch(e) {}
  // 5秒後にバナー表示
  setTimeout(showInstallBanner, 5000);
}

function showInstallBanner() {
  var isJa = (lang === 'ja');
  var banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML =
    '<div class="ib-inner">' +
    '<div class="ib-icon">📱</div>' +
    '<div class="ib-text">' +
    '<div class="ib-title">' + (isJa ? 'ホーム画面に追加できます' : 'Add to Home Screen') + '</div>' +
    '<div class="ib-desc">' + (isJa ? '共有ボタン → 「ホーム画面に追加」をタップ' : 'Share button → "Add to Home Screen"') + '</div>' +
    '</div>' +
    '<button class="ib-close" onclick="closeInstallBanner()">✕</button>' +
    '</div>';
  document.body.appendChild(banner);
}

function closeInstallBanner() {
  var b = document.getElementById('install-banner');
  if (b) b.remove();
}

setTimeout(checkInstallPrompt, 1500);
</script>
</body>
</html>
