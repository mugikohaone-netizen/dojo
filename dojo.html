<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ff6b35">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AIアプリ道場</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* アニメーション */
@keyframes fadeUp  { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
@keyframes slideUp { from { opacity:0; transform:translateY(22px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse   { 0%,100% { transform:scale(1) } 50% { transform:scale(1.1) } }
@keyframes blink   { 0%,100% { opacity:1 } 50% { opacity:0 } }
@keyframes shimmer { 0% { background-position:200% center } 100% { background-position:-200% center } }
@keyframes slideIn { from { opacity:0; transform:translateX(-10px) } to { opacity:1; transform:translateX(0) } }

* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:#0a0a0a; color:#f0f0f0; font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }

#app { display:flex; flex-direction:column; min-height:100vh; max-width:480px; margin:0 auto; }

/* ヘッダー */
#hdr { position:sticky; top:0; z-index:100; background:#0d0d0d; border-bottom:1px solid #161616; padding:13px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#hdr-left { font-weight:900; font-size:16px; letter-spacing:0.5px; }
#hdr-right { display:flex; align-items:center; gap:8px; }
.badge { background:#ff6b35; color:#fff; font-size:9px; font-weight:700; padding:2px 7px; border-radius:3px; letter-spacing:1.5px; }
#lang-btn, #back-btn { background:transparent; border:1px solid #252525; border-radius:8px; padding:5px 12px; font-size:11px; cursor:pointer; font-family:inherit; }
#lang-btn { color:#ff6b35; font-weight:700; background:#1a1a1a; }
#back-btn { color:#555; display:none; }

/* PWAバナー */
#pwa-banner { display:none; background:#1a0f00; border-bottom:1px solid #ff6b3544; padding:10px 16px; align-items:center; gap:10px; animation:fadeUp 0.3s ease; }
#pwa-banner.show { display:flex; }
#pwa-banner-text { flex:1; font-size:12px; color:#ccc; line-height:1.5; }
#pwa-add-btn { background:#ff6b35; color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit; }
#pwa-dismiss { background:transparent; color:#555; border:none; font-size:11px; cursor:pointer; font-family:inherit; }

/* メイン */
#content { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ボタン */
.btn-p { background:#ff6b35; color:#fff; border:none; border-radius:12px; padding:13px 0; font-size:15px; font-weight:700; cursor:pointer; width:100%; font-family:inherit; transition:opacity 0.2s; }
.btn-p:active { opacity:0.8; }
.btn-g { background:transparent; border:1px solid #242424; border-radius:12px; padding:12px 0; font-size:13.5px; cursor:pointer; width:100%; font-family:inherit; color:#555; }
.btn-s { background:#ff6b35; color:#fff; border:none; border-radius:8px; padding:7px 13px; font-size:12.5px; cursor:pointer; font-weight:600; font-family:inherit; }
.btn-send { background:#ff6b35; color:#fff; border:none; border-radius:10px; padding:10px 15px; font-weight:700; cursor:pointer; font-size:13.5px; white-space:nowrap; font-family:inherit; }

/* センター画面 */
.center { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
.center-card { text-align:center; max-width:340px; animation:slideUp 0.5s ease; }
.big-emoji { font-size:56px; margin-bottom:14px; }
.c-title { font-size:20px; font-weight:900; margin-bottom:12px; line-height:1.45; }
.c-desc  { font-size:13px; color:#888; line-height:1.8; margin-bottom:28px; }
.step-badge { font-size:11px; color:#ff6b35; font-weight:700; letter-spacing:1.5px; margin-bottom:16px; }

/* 記事 */
#article { flex:1; overflow-y:auto; padding-bottom:32px; }
.art-header { padding:20px 18px 0; border-bottom:1px solid #181818; }
.art-tag { display:inline-block; background:#ff6b35; color:#fff; font-size:9px; font-weight:900; letter-spacing:2px; padding:3px 9px; border-radius:3px; margin-bottom:12px; }
.art-title { font-size:17px; font-weight:900; line-height:1.55; margin-bottom:14px; }
.author-row { display:flex; align-items:center; gap:9px; padding-bottom:16px; }
.author-av { width:32px; height:32px; border-radius:50%; background:#ff6b35; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.author-name { font-size:13px; font-weight:700; }
.author-date { font-size:10px; color:#444; }
.art-body { padding:18px 18px 0; }
.art-lead { font-size:13.5px; line-height:1.9; color:#bbb; margin-bottom:14px; }
.art-hint { background:#111; border:1px solid #ff6b3530; border-radius:9px; padding:10px 13px; margin-bottom:18px; font-size:11.5px; color:#666; display:flex; gap:8px; }
.rounds { padding:0 18px; display:flex; flex-direction:column; gap:10px; }
.round-card { background:#0f0f0f; border:1px solid #1c1c1c; border-radius:13px; overflow:hidden; transition:border-color 0.25s; }
.round-card.open { border-color:#ff6b35; }
.round-hdr { padding:14px 16px; cursor:pointer; display:flex; gap:13px; align-items:center; }
.round-icon-wrap { width:42px; height:42px; border-radius:11px; flex-shrink:0; background:#161616; border:1px solid #282828; display:flex; align-items:center; justify-content:center; font-size:19px; transition:background 0.25s; }
.round-card.open .round-icon-wrap { background:#ff6b35; border-color:#ff6b35; }
.round-badge-text { font-size:9.5px; color:#555; font-weight:700; letter-spacing:1.2px; margin-bottom:3px; }
.round-card.open .round-badge-text { color:#ff6b35; }
.round-title { font-size:14.5px; font-weight:700; }
.round-arrow { font-size:18px; color:#383838; transition:transform 0.25s; margin-left:auto; }
.round-card.open .round-arrow { transform:rotate(90deg); }
.round-body { padding:0 16px 16px; border-top:1px solid #181818; animation:fadeUp 0.25s ease; }
.round-quote { font-size:12.5px; color:#555; line-height:1.75; padding:12px 0 14px; border-bottom:1px solid #181818; margin-bottom:14px; font-style:italic; }
.prog-row { padding:18px 18px 0; display:flex; gap:6px; align-items:center; }
.prog-bar { height:3px; flex:1; border-radius:2px; background:#1c1c1c; transition:background 0.4s; }
.prog-bar.done { background:#ff6b35; }
.prog-count { font-size:10px; color:#444; margin-left:6px; white-space:nowrap; }
.cta-box { margin:20px 18px 0; background:linear-gradient(135deg,#120800,#1e0f00); border:1px solid #ff6b3555; border-radius:16px; padding:22px 18px; animation:fadeUp 0.5s ease; text-align:center; }
.cta-emoji { font-size:36px; margin-bottom:10px; }
.cta-title { font-size:16px; font-weight:900; margin-bottom:8px; }
.cta-desc  { font-size:12.5px; color:#999; line-height:1.75; margin-bottom:18px; }
.cta-hint  { font-size:11px; color:#555; margin-bottom:14px; }
.cta-zero  { font-size:10.5px; color:#444; margin-top:10px; }
#cta-btn { border-radius:12px; padding:14px 0; font-size:15px; font-weight:700; width:100%; font-family:inherit; cursor:pointer; transition:all 0.3s; border:1px solid #2a2a2a; background:#1a1a1a; color:#555; }
#cta-btn.ready { background:#ff6b35; color:#fff; border:none; background-image:linear-gradient(90deg,#ff6b35,#ff9055,#ff6b35); background-size:200% auto; animation:shimmer 2s linear infinite; }
.skip-link { text-align:center; margin-top:10px; }
.skip-link button { background:transparent; border:none; color:#555; font-size:11.5px; cursor:pointer; font-family:inherit; text-decoration:underline; padding:4px 8px; }
.art-footer { padding:24px 18px 0; border-top:1px solid #141414; margin-top:24px; }
.art-footer-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.art-footer-av { width:38px; height:38px; border-radius:50%; background:#ff6b35; display:flex; align-items:center; justify-content:center; font-size:18px; }
.art-footer-name { font-size:13px; font-weight:700; }
.art-footer-desc { font-size:10.5px; color:#444; }
.art-footer-cta { font-size:12px; color:#3a3a3a; line-height:1.75; }
.support-box { margin-top:14px; background:#111; border:1px solid #ff6b3533; border-radius:10px; padding:12px 14px; }
.support-box-title { font-size:12px; color:#ff6b35; font-weight:700; margin-bottom:4px; }
.support-box-desc { font-size:11.5px; color:#666; line-height:1.7; }
.terms-link { margin-top:12px; font-size:11px; color:#333; }
.terms-link a { color:#444; text-decoration:none; }

/* デモ */
.demo-chat { display:flex; flex-direction:column; gap:10px; }
.bubble-row { display:flex; gap:8px; align-items:flex-start; animation:slideIn 0.3s ease; }
.bubble-row.right { justify-content:flex-end; }
.bubble-av { font-size:20px; flex-shrink:0; }
.bubble-name { font-size:10px; font-weight:700; margin-bottom:2px; }
.bubble { padding:9px 13px; max-width:250px; font-size:12.5px; line-height:1.65; border-radius:3px 14px 14px 14px; }
.bubble.them { background:#161616; color:#d0d0d0; }
.bubble.me   { background:#ff6b35; color:#fff; border-radius:14px 3px 14px 14px; }
.typing { font-size:11px; color:#444; animation:blink 1s infinite; padding-left:28px; }
.spec-item { background:#141414; border:1px solid #222; border-radius:10px; padding:11px 13px; display:flex; gap:11px; align-items:center; margin-bottom:9px; animation:fadeUp 0.4s ease both; }
.spec-icon { font-size:22px; flex-shrink:0; }
.spec-label { font-size:10px; color:#555; margin-bottom:2px; }
.spec-value { font-size:13px; color:#ddd; }
.code-box { background:#0d1117; border:1px solid #1e2a1e; border-radius:10px; padding:12px 14px; font-family:monospace; font-size:11.5px; max-height:200px; overflow-y:auto; line-height:1.7; }
.code-cursor { color:#ff6b35; animation:blink 0.6s infinite; }

/* インタビュー */
#interview { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#prog-bar  { height:3px; background:#1e1e1e; flex-shrink:0; }
#prog-fill { height:100%; background:#ff6b35; transition:width 0.5s; }
#step-lbl  { font-size:10px; color:#444; text-align:right; padding:5px 16px; letter-spacing:1px; flex-shrink:0; }
#messages  { flex:1; overflow-y:auto; padding:8px 16px; display:flex; flex-direction:column; gap:14px; }
.msg-ai   { display:flex; gap:9px; align-items:flex-start; animation:fadeUp 0.3s ease; }
.msg-user { display:flex; justify-content:flex-end; animation:fadeUp 0.3s ease; }
.msg-av { font-size:26px; flex-shrink:0; margin-top:3px; }
.msg-bubble-ai   { background:#151515; border:1px solid #252525; border-radius:3px 14px 14px 14px; padding:11px 13px; max-width:272px; font-size:13.5px; line-height:1.65; color:#ddd; }
.msg-bubble-user { background:#ff6b35; border-radius:14px 3px 14px 14px; padding:11px 13px; max-width:272px; font-size:13.5px; line-height:1.65; color:#fff; }
.msg-hint { font-size:10.5px; color:#484848; margin-top:5px; margin-left:4px; }
#input-area { display:flex; gap:8px; padding:11px 16px; border-top:1px solid #181818; background:#0a0a0a; flex-shrink:0; }
#chat-inp { flex:1; background:#161616; border:1px solid #242424; border-radius:10px; color:#f0f0f0; padding:10px 13px; font-size:13.5px; outline:none; font-family:inherit; }

/* ローディング */
#loading { flex:1; display:flex; align-items:center; justify-content:center; }
#loading-inner { text-align:center; max-width:300px; padding:20px; }
#loading-emoji { font-size:60px; margin-bottom:18px; display:inline-block; animation:pulse 1s infinite; }
#loading-text  { font-size:15.5px; font-weight:700; margin-bottom:22px; min-height:50px; line-height:1.6; }
#loading-dots  { display:flex; gap:5px; justify-content:center; margin-bottom:18px; }
.ldot { width:7px; height:7px; border-radius:50%; background:#222; transition:background 0.3s; }
.ldot.on { background:#ff6b35; }
#loading-sub { font-size:11px; color:#383838; }

/* 結果 */
#result { flex:1; display:flex; flex-direction:column; max-width:400px; margin:0 auto; width:100%; padding:22px 16px; gap:18px; overflow-y:auto; animation:slideUp 0.5s ease; }
.result-head { text-align:center; }
.result-emoji { font-size:44px; }
.result-title { font-size:21px; font-weight:900; margin:8px 0 4px; }
.result-desc  { color:#666; font-size:12.5px; }
.phone-frame { background:#0f0f0f; border:2px solid #24242433; border-radius:22px; width:276px; overflow:hidden; margin:0 auto; }
.phone-hdr  { background:#161616; padding:13px 15px; border-bottom:1px solid #1e1e1e; font-weight:700; font-size:14.5px; }
.phone-body { padding:6px 0; min-height:190px; }
.check-item { display:flex; align-items:center; gap:11px; padding:11px 15px; cursor:pointer; border-bottom:1px solid #131313; transition:background 0.2s; }
.check-item.done { }
.check-icon  { font-size:17px; }
.check-label { font-size:13.5px; transition:opacity 0.2s; }
.check-label.done { text-decoration:line-through; opacity:0.38; }
.alldone-msg { text-align:center; padding:14px; font-weight:700; font-size:12.5px; animation:fadeUp 0.4s ease; display:none; }
.result-note { text-align:center; font-size:10.5px; color:#333; padding:7px 14px; background:#0f0f0f; border-radius:8px; }

/* ダウンロードカード */
.dl-card { border-radius:14px; padding:16px; }
.dl-card-title { font-size:13px; font-weight:700; margin-bottom:6px; }
.dl-card-desc  { font-size:11.5px; color:#555; line-height:1.7; margin-bottom:12px; }
.pro-tag { position:absolute; top:10px; right:12px; background:#ff6b35; color:#fff; font-size:9px; font-weight:900; padding:2px 8px; border-radius:10px; letter-spacing:1px; }
.pro-feature { display:flex; align-items:center; gap:8px; font-size:12.5px; color:#ccc; margin-bottom:7px; }
.pro-feature-icon { font-size:16px; width:22px; }
.share-step { display:flex; gap:10px; align-items:flex-start; font-size:12px; color:#aaa; margin-bottom:6px; }
.share-step-num { background:#5c9eff22; color:#5c9eff; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
.result-actions { display:flex; flex-direction:column; gap:9px; }

/* エラー系 */
.err-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
.err-card   { text-align:center; max-width:320px; animation:fadeUp 0.4s ease; }
.err-emoji  { font-size:52px; margin-bottom:14px; }
.err-title  { font-size:17px; font-weight:800; margin-bottom:10px; }
.err-desc   { font-size:13px; color:#777; line-height:1.75; margin-bottom:24px; }
.hold-box   { background:#1a0f00; border:1px solid #ff6b3544; border-radius:12px; padding:16px; margin-bottom:20px; font-size:13px; color:#ddd; line-height:1.8; text-align:left; }
</style>

</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hdr-left">🥋 <span id="hdr-name">AIアプリ道場</span></div>
    <div id="hdr-right">
      <button id="back-btn" onclick="showArticle()"></button>
      <button id="lang-btn" onclick="toggleLang()">EN</button>
      <span class="badge">BETA</span>
    </div>
  </div>
  <div id="pwa-banner">
    <span>📱</span>
    <span id="pwa-banner-text">ホーム画面に追加してアプリとして使えます！</span>
    <button id="pwa-add-btn" onclick="handleInstall()">追加する</button>
    <button id="pwa-dismiss" onclick="dismissPWA()">あとで</button>
  </div>
  <div id="content"></div>
</div>

function saveProgress(data){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }catch(e){} }

function clearProgress(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
function getUserToken(){
  var tok=localStorage.getItem(TOKEN_KEY);
  if(!tok){ tok='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,9); localStorage.setItem(TOKEN_KEY,tok); }
  return tok;
}
function checkRate(){
  var today=new Date().toISOString().slice(0,10);
  try{ var d=JSON.parse(localStorage.getItem(RATE_KEY)||'{}'); return (d.date===today && d.count>=1); }catch(e){ return false; }
}
function incRate(){
  var today=new Date().toISOString().slice(0,10);
  try{ var d=JSON.parse(localStorage.getItem(RATE_KEY)||'{}'); var c=(d.date===today?d.count:0)+1; localStorage.setItem(RATE_KEY,JSON.stringify({date:today,count:c})); }catch(e){}
}

function mockGen(ans){
  var p=ans.problem||'', f=ans.feel||'', k=ans.killer||'', u=ans.user||'あなた';
  var d=getDesign(f);
  var items=k
    ? ['✅ '+k.slice(0,12)+'の確認①','📋 '+k.slice(0,12)+'の確認②','🔍 '+k.slice(0,12)+'の確認③','💡 '+k.slice(0,12)+'の確認④','🎯 '+k.slice(0,12)+'の完了確認']
    : ['🎯 今日の目標①','📌 確認事項②','✅ タスク③','💡 メモ④','🔄 振り返り⑤'];
  return {
    app_name: p.slice(0,15)||'マイチェックリスト',
    one_liner: u+'のためのアプリ',
    items: items,
    done_message: f ? '🔥「'+f+'」達成！押忍！' : '🎊 全部クリア！最高です！',
    feel: f, design: d,
    storage_key: 'app_'+Date.now(),
    warnings: []
  };
}

// -----------------------------------------------
// バックエンド呼び出し
// -----------------------------------------------
async function callBackend(ans){
  if(!BACKEND_URL) return mockGen(ans);
  var res=await fetch(BACKEND_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ answers:ans, userToken:getUserToken() })
  });
  if(res.status===429){ var d=await res.json().catch(function(){ return {}; }); throw new Error(d.error==='RATE_LIMIT_USER'?'RATE_LIMIT_USER':'RATE_LIMIT'); }
  if(res.status===403) throw new Error('CAPTCHA_FAILED');
  if(!res.ok) throw new Error('BACKEND_ERROR');
  var spec=await res.json();
  if(spec.status==='ok') incRate();
  return spec;
}

// -----------------------------------------------
function render(){
  var c=document.getElementById('content');
  if(view==='article'){ c.innerHTML=renderArticle(); bindArticle(); return; }
  if(phase==='welcome')    { c.innerHTML=renderWelcome(); return; }
  if(phase==='interview')  { c.innerHTML=renderInterview(); bindInterview(); scrollBottom(); return; }
  if(phase==='loading')    { c.innerHTML=renderLoading(); return; }
  if(phase==='result')     { c.innerHTML=renderResult(); return; }
  if(phase==='hold')       { c.innerHTML=renderHold(); return; }
  if(phase==='blocked')    { c.innerHTML=renderBlocked(); return; }
  if(phase==='rateLimit')  { c.innerHTML=renderRateLimit(); return; }
  c.innerHTML=renderError();
}

function renderArticle(){
  var isEn=(lang==='en');
  var tl=t().articleTitle.split('\n');
  var roundsHTML=ROUNDS.map(function(r){
    var isOpen=(openRound===r.id);
    var bd=(isEn?r.badgeEn:r.badgeJa);
    var ti=(isEn?r.titleEn:r.titleJa);
    var qt=(isEn?r.quoteEn:r.quoteJa);
    var body='';
    if(isOpen){
      body='<div class="round-body"><div class="round-quote">「'+qt+'」</div><div id="demo-'+r.id+'">'+renderDemo(r)+'</div></div>';
    }
    return '<div class="round-card'+(isOpen?' open':'')+'">'
      +'<div class="round-hdr" onclick="toggleRound(\''+r.id+'\')">'
      +'<div class="round-icon-wrap">'+r.icon+'</div>'
      +'<div style="flex:1"><div class="round-badge-text">'+bd+'</div><div class="round-title">'+ti+'</div></div>'
      +'<div class="round-arrow">›</div>'
      +'</div>'+body+'</div>';
  }).join('');

  var bars=ROUNDS.map(function(_,i){ return '<div class="prog-bar'+(i<readCount?' done':'')+'"></div>'; }).join('');
  var ctaReady=(readCount>=ROUNDS.length);
  var ctaPartial=(readCount>=2 && !ctaReady);
  var ctaBtn='<button id="cta-btn" class="'+(ctaReady?'ready':'')+'"'
    +' style="'+(ctaReady?'background:#ff6b35;color:#fff;border:none;background-image:linear-gradient(90deg,#ff6b35,#ff9055,#ff6b35);background-size:200% auto;animation:shimmer 2s linear infinite;':'background:#ff6b35;color:#fff;border:none;')+'"'
    +' onclick="showDojo()">'+t().enterDojo+'</button>';
  var skipBtn=ctaPartial?'<div class="skip-link"><button onclick="skipAll()">'+t().skipLink+'</button></div>':'';
  var ctaHtml=readCount>=2?'<div class="cta-box"><div class="cta-emoji">👊</div><div class="cta-title">'+t().tryYourself+'</div><div class="cta-desc">'+t().tryDesc+'</div>'+ctaBtn+skipBtn+'<div class="cta-zero">'+t().zeroProg+'</div></div>':'';

  return '<div id="article">'
    +'<div class="art-header">'
    +'<div class="art-tag">INTERACTIVE ARTICLE</div>'
    +'<h1 class="art-title">'+tl[0]+'<br>'+(tl[1]||'')+'</h1>'
    +'<div class="author-row"><div class="author-av">🥋</div><div><div class="author-name">karate papa</div><div class="author-date">'+t().authorDate+'</div></div></div>'
    +'</div>'
    +'<div class="art-body">'
    +'<p class="art-lead">'+t().articleLead+'</p>'
    +'<div class="art-hint"><span>💡</span><span>'+t().articleHint+'</span></div>'
    +'</div>'
    +'<div class="rounds">'+roundsHTML+'</div>'
    +'<div class="prog-row">'+bars+'<div class="prog-count">'+readCount+'/'+ROUNDS.length+'</div></div>'
    +ctaHtml
    +'<div class="art-footer">'
    +'<div class="art-footer-row"><div class="art-footer-av">🥋</div><div><div class="art-footer-name">karate papa</div><div class="art-footer-desc">'+t().authorDesc+'</div></div></div>'
    +'<div class="art-footer-cta">'+t().authorCTA+'</div>'
    +'<div class="support-box"><div class="support-box-title">'+t().supportTitle+'</div><div class="support-box-desc">'+t().supportDesc+'</div></div>'
    +'<div class="terms-link"><a href="./terms.html">📜 '+(isEn?'Terms of Service':'利用規約')+'</a></div>'
    +'</div>'
    +'</div>';
}

function bindArticle(){
  if(openRound) startDemoAnim(openRound);
}

function toggleRound(id){
  var wasOpen=(openRound===id);
  openRound=wasOpen?null:id;
  if(!wasOpen){ readCount++; demoShown[id]=0; }
  render();
  if(!wasOpen) startDemoAnim(id);
}

function skipAll(){
  readCount=ROUNDS.length;
  render();
  setTimeout(function(){ showDojo(); },300);
}

function renderDemo(r){
  if(r.type==='spec')  return renderSpecDemo(r);
  if(r.type==='code')  return renderCodeDemo(r);
  if(r.type==='debug') return renderDebugDemo(r);
  return renderBattleDemo(r);
}

function renderBattleDemo(r){
  var isEn=(lang==='en');
  var shown=demoShown[r.id]||0;
  var html='<div class="demo-chat">';
  for(var i=0;i<Math.min(shown,r.exchanges.length);i++){
    var e=r.exchanges[i];
    var isMe=(e.who==='パパさん'||e.who==='user');
    var txt=(isEn&&e.en)?e.en:e.ja;
    if(isMe){
      html+='<div class="bubble-row right"><div class="bubble me">'+txt+'</div><div class="bubble-av">'+e.av+'</div></div>';
    } else {
      html+='<div class="bubble-row">'
        +'<div class="bubble-av">'+e.av+'</div>'
        +'<div><div class="bubble-name" style="color:'+e.col+'">'+e.who+'</div>'
        +'<div class="bubble them" style="border:1px solid '+e.col+'44">'+txt+'</div></div>'
        +'</div>';
    }
  }
  if(shown<r.exchanges.length) html+='<div class="typing">● '+(isEn?'discussing…':'議論中…')+'</div>';
  html+='</div>';
  return html;
}

function renderSpecDemo(r){
  var isEn=(lang==='en');
  return r.specItems.map(function(it,i){
    return '<div class="spec-item" style="animation-delay:'+(i*0.08)+'s">'
      +'<div class="spec-icon">'+it.icon+'</div>'
      +'<div><div class="spec-label">'+(isEn?it.labelEn:it.labelJa)+'</div>'
      +'<div class="spec-value">'+(isEn?it.valEn:it.valJa)+'</div></div>'
      +'</div>';
  }).join('');
}

function renderCodeDemo(r){
  var shown=demoShown[r.id]||0;
  var html='<div class="code-box">';
  r.codeLines.slice(0,shown).forEach(function(line){
    var col=line.match(/^\/\//)?'#6a9955':line.match(/^\s*</)&&!line.match(/script/)&&!line.match(/style/)?'#4ec9b0':line.indexOf('{')>=0?'#dcdcaa':'#d4d4d4';
    html+='<div style="color:'+col+'">'+line+'</div>';
  });
  if(shown<r.codeLines.length) html+='<span class="code-cursor">▌</span>';
  html+='</div>';
  return html;
}

function renderDebugDemo(r){
  var isEn=(lang==='en');
  var shown=demoShown[r.id]||0;
  var html='<div class="demo-chat">';
  for(var i=0;i<Math.min(shown,r.exchanges.length);i++){
    var e=r.exchanges[i];
    var txt=(isEn&&e.en)?e.en:e.ja;
    if(e.who==='user'){
      html+='<div class="bubble-row right"><div class="bubble me">'+txt+'</div></div>';
    } else {
      html+='<div class="bubble-row"><div class="bubble-av">🥋</div><div class="bubble them">'+txt+'</div></div>';
    }
  }
  if(shown<r.exchanges.length) html+='<div class="typing">● '+(isEn?'replying…':'返信中…')+'</div>';
  html+='</div>';
  return html;
}

function startDemoAnim(id){
  var r=ROUNDS.find(function(r){ return r.id===id; });
  if(!r) return;
  if(demoTimers[id]) clearInterval(demoTimers[id]);
  var max=(r.type==='code')?r.codeLines.length:(r.exchanges?r.exchanges.length:0);
  if(!max) return;
  var interval=(r.type==='code')?75:880;
  demoTimers[id]=setInterval(function(){
    demoShown[id]=(demoShown[id]||0)+1;
    var el=document.getElementById('demo-'+id);
    if(el) el.innerHTML=renderDemo(r);
    if(demoShown[id]>=max){ clearInterval(demoTimers[id]); delete demoTimers[id]; }
  },interval);
}

// -----------------------------------------------
// インタビュー
// -----------------------------------------------
function startInterview(){
  qIndex=0; answers={}; messages=[];
  addMsg('ai',t().questions[0].text,t().questions[0].hint);
  phase='interview'; render();
}

function addMsg(from,text,hint,isRedirect,isLast){
  messages.push({from:from,text:text,hint:hint,isRedirect:isRedirect,isLast:isLast});
}

function renderInterview(){
  var pct=Math.round((qIndex+1)/t().questions.length*100);
  var lastMsg=messages[messages.length-1];
  var inputOff=lastMsg&&(lastMsg.isLast||lastMsg.isRedirect);
  var msgsHTML=messages.map(function(m){
    if(m.from==='ai'){
      var lines=m.text.split('\n').map(function(l){ return '<p style="margin-bottom:2px">'+l+'</p>'; }).join('');
      var hint=m.hint?'<div class="msg-hint">💡 '+m.hint+'</div>':'';
      var redir=m.isRedirect?'<button class="btn-s" style="margin-top:9px" onclick="continueRedirect()">'+t().redirectBtn+'</button>':'';
      return '<div class="msg-ai"><div class="msg-av">🥋</div><div><div class="msg-bubble-ai">'+lines+'</div>'+hint+redir+'</div></div>';
    } else {
      return '<div class="msg-user"><div class="msg-bubble-user">'+m.text+'</div></div>';
    }
  }).join('');
  var qs=t().questions;
  var ph=qs[Math.min(qIndex,qs.length-1)].ph;
  var inputHTML=!inputOff?'<div id="input-area"><input id="chat-inp" placeholder="'+ph+'" onkeydown="handleKey(event)" oncompositionstart="isComposing=true" oncompositionend="isComposing=false"><button class="btn-send" onclick="sendMsg()">'+t().send+'</button></div>':'';
  return '<div id="interview">'
    +'<div id="prog-bar"><div id="prog-fill" style="width:'+pct+'%"></div></div>'
    +'<div id="step-lbl">STEP '+(qIndex+1)+' / '+qs.length+'</div>'
    +'<div id="messages">'+msgsHTML+'<div id="msg-btm"></div></div>'
    +inputHTML
    +'</div>';
}

function bindInterview(){
  var inp=document.getElementById('chat-inp');
  if(inp) setTimeout(function(){ inp.focus(); },100);
}

function scrollBottom(){
  setTimeout(function(){
    var el=document.getElementById('msg-btm');
    if(el) el.scrollIntoView({behavior:'smooth'});
  },50);
}

function handleKey(e){
  if(e.key==='Enter'&&!isComposing) sendMsg();
}

function sendMsg(){
  var inp=document.getElementById('chat-inp');
  if(!inp||!inp.value.trim()) return;
  var val=inp.value.trim();

  if(/みんなで|複数人|他人と|グループで|リアルタイムで共有|multi.user|share with team/i.test(val)){
    addMsg('user',val);
    addMsg('ai',t().redirectMsg,t().redirectHint,true);
    saveProgress({stage:'interview',qIndex:qIndex,answers:answers});
    phase='interview'; render(); return;
  }

  var q=t().questions[qIndex];
  answers[q.id]=val;
  addMsg('user',val);
  var next=qIndex+1;

  if(next>=t().questions.length){
    if(checkRate()){
      addMsg('ai',lang==='ja'?'本日のアプリ生成はすでに行いました。また明日来てください！押忍🥋':'You\'ve already generated an app today. Come back tomorrow! Osu 🥋');
      phase='interview'; render(); return;
    }
    addMsg('ai',t().doneMsg,null,false,true);
    saveProgress({stage:'interview',qIndex:qIndex,answers:answers});
    phase='interview'; render();
    setTimeout(function(){ phase='loading'; loadStep=0; saveProgress({stage:'loading',answers:answers,qIndex:qIndex}); render(); startLoading(); },1400);
  } else {
    qIndex=next;
    addMsg('ai',t().questions[next].text,t().questions[next].hint);
    saveProgress({stage:'interview',qIndex:qIndex,answers:answers});
    phase='interview'; render();
  }
}

function continueRedirect(){
  addMsg('ai',t().questions[qIndex].text,t().questions[qIndex].hint);
  phase='interview'; render();
}

// -----------------------------------------------
// ローディング
// -----------------------------------------------
function startLoading(){
  if(loadTimer) clearTimeout(loadTimer);
  tickLoader();
}

function tickLoader(){
  var msgs=t().loadingMsgs;
  if(loadStep>=msgs.length-1){
    loadTimer=setTimeout(async function(){
      try{
        var spec=await callBackend(answers);
        if(spec.status==='hold')   { holdMsg=spec.hold_reason||''; phase='hold';    render(); return; }
        if(spec.status==='blocked'){ holdMsg=spec.blocked_reason||''; phase='blocked'; render(); return; }
        genApp=spec;
        saveProgress({stage:'result',answers:answers,app:spec});
        checkedItems={};
        phase='result'; render();
      }catch(e){
        if(e.message==='RATE_LIMIT'||e.message==='RATE_LIMIT_USER') phase='rateLimit';
        else phase='error';
        render();
      }
    },1800);
    return;
  }
  loadTimer=setTimeout(function(){ loadStep++; updateLoadingUI(); tickLoader(); },1500);
}

function updateLoadingUI(){
  var msgs=t().loadingMsgs;
  var em=document.getElementById('loading-emoji');
  var tx=document.getElementById('loading-text');
  if(em) em.textContent=msgs[loadStep].icon;
  if(tx) tx.textContent=msgs[loadStep].text;
  document.querySelectorAll('.ldot').forEach(function(d,i){ d.classList.toggle('on',i<=loadStep); });
}

function renderLoading(){
  var msgs=t().loadingMsgs;
  var dots=msgs.map(function(_,i){ return '<div class="ldot'+(i<=loadStep?' on':'')+'"></div>'; }).join('');
  return '<div id="loading"><div id="loading-inner">'
    +'<div id="loading-emoji">'+msgs[loadStep].icon+'</div>'
    +'<div id="loading-text">'+msgs[loadStep].text+'</div>'
    +'<div id="loading-dots">'+dots+'</div>'
    +'<div id="loading-sub">'+t().loadingSub+'</div>'
    +'</div></div>';
}

function toggleCheck(i){
  checkedItems[i]=!checkedItems[i];
  if(genApp) try{ localStorage.setItem(genApp.storage_key,JSON.stringify(checkedItems)); }catch(e){}
  var c=document.getElementById('content');
  c.innerHTML=renderResult();
}

function getBugText(){
  if(bugPhase==='fixing') return t().bugFixing;
  if(bugPhase==='fixed')  return t().bugFixed;
  return t().bugIdle;
}
var bugTimer=null;
function handleBug(){
  if(bugPhase!=='idle') return;
  bugPhase='fixing';
  var c=document.getElementById('content'); c.innerHTML=renderResult();
  bugTimer=setTimeout(function(){ bugPhase='fixed'; var ct=document.getElementById('content'); ct.innerHTML=renderResult(); },2500);
  bugTimer=setTimeout(function(){ bugPhase='idle';  var ct=document.getElementById('content'); ct.innerHTML=renderResult(); },5500);
}

    +'<div class="err-emoji">😵</div>'
    +'<div class="err-title">'+t().errorTitle+'</div>'
    +'<div class="err-desc">'+t().errorDesc.replace('\n','<br>')+'</div>'
    +'<button class="btn-p" onclick="startInterview()">'+t().retryFight+'</button>'
    +'</div></div>';
}

// -----------------------------------------------
// リセット
// -----------------------------------------------
function resetAll(){
  clearProgress(); qIndex=0; answers={}; messages=[];
  loadStep=0; genApp=null; holdMsg=''; checkedItems={};
  if(loadTimer) clearTimeout(loadTimer);
  if(bugTimer)  clearTimeout(bugTimer);
  bugPhase='idle'; phase='welcome'; render();
}

// -----------------------------------------------
// 起動
// -----------------------------------------------
render();
</script>
